name: dayout_weather
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # state management & DI
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # navigation
  go_router: ^17.1.0

  # network
  dio: ^5.9.2
  retrofit: ^4.9.2

  # local database
  drift: ^2.31.0

  # storing api keys
  envied: ^1.3.3

  # code generation helpers
  json_annotation: ^4.11.0

  # utils
  intl: ^0.20.2
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # code generation
  build_runner: ^2.13.1
  envied_generator: ^1.3.1
  retrofit_generator: ^10.2.3
  drift_dev: ^2.20.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0

flutter:
  generate: true
  uses-material-design: true